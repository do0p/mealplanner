<nav class="nav">
  <a class="nav-brand" routerLink="/recipes">🍽 Mealplanner</a>
  <div class="nav-links">
    <a routerLink="/recipes" routerLinkActive="active">Recipes</a>
    <a routerLink="/planner" routerLinkActive="active">Planner</a>
  </div>
  <div class="nav-right">
    <a routerLink="/import" routerLinkActive="active">Import</a>
  </div>
</nav>

<main>
  <router-outlet />
</main>

<footer class="app-footer">
  v{{ version }} ·
  <select class="tz-select" (change)="onTzChange($event)">
    @for (tz of timezones; track tz.value) {
      <option [value]="tz.value" [selected]="settings.timezone() === tz.value">{{ tz.label }}</option>
    }
  </select>
</footer>
