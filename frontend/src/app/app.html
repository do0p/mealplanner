<nav class="nav">
  <a class="nav-brand" routerLink="/recipes">🍽 Mealplanner</a>
  <div class="nav-links">
    <a routerLink="/recipes" routerLinkActive="active">Recipes</a>
    <a routerLink="/planner" routerLinkActive="active">Planner</a>
  </div>
  <div class="nav-right">
    <a routerLink="/import" routerLinkActive="active">Import</a>
    <button class="theme-toggle" (click)="settings.toggleDarkMode()" [title]="settings.darkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      {{ settings.darkMode() ? '☀️' : '🌙' }}
    </button>
  </div>
</nav>

<main>
  <router-outlet />
</main>

<footer class="app-footer">
  v{{ version }}
</footer>

@if (toast.toasts().length > 0) {
  <div class="toast-container">
    @for (t of toast.toasts(); track t.id) {
      <div class="toast {{ t.type }}" (click)="toast.dismiss(t.id)">{{ t.message }}</div>
    }
  </div>
}
